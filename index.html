<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList-moon</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="clock sm:max-w-[500px] max-w-[350px] sm:max-h-[180px] h-[180px] mx-auto relative sm:mt-[20px] mt-[5px] sm:before:w-[80px] before:w-[70px] sm:before:h-[80px] before:h-[70px] before:bg-[#BFC6D7] before:rounded-[5px] before:absolute sm:before:left-[15px] before:left-[10px] sm:before:top-0 before:top-4 before:z-10 sm:after:w-[90px] sm:after:h-[90px] after:w-[85px] after:h-[85px] after:bg-[#184562] after:rounded-full after:absolute sm:after:right-[15px] after:right-[10px] sm:after:bottom-[-2px] after:bottom-2 after:z-10 ">
        <div class="sm:max-w-[400px] max-w-[280px] sm:max-h-[130px] max-h-[100px] m-auto absolute inset-0 ">
            <div class="w-full h-full flex items-center justify-center pb-3 bg-[#C0CDE4]/45 rounded-xl backdrop-blur-[40px] shadow-[0_0_20px_rgba(0,0,0,0.5)] border-3 border-white/18 relative z-20">
                <span id="hrs" class="sm:w-[40px] w-[35px] sm:text-[58px] text-[38px] text-shadow inline-block text-center relative after:content-['HOURS'] sm:after:text-[15px] after:text-[11px] after:text-shadow-none after:text-#2D455B after:absolute after:-bottom-[9px] sm:after:left-[77%] after:left-[55%] after:-translate-x-1/2">00</span>
                <span class="sm:w-[40px] w-[35px] sm:pl-2 pl-1.5 sm:text-[58px] text-[38px] mb-2 sm:ml-3 ml-0 inline-block text-slate-700 text-center relative">:</span>    
                <span id="min" class="sm:w-[40px] w-[35px] sm:text-[58px] text-[38px] text-shadow inline-block text-center relative after:content-['MIN'] sm:after:text-[15px] after:text-[11px] after:text-shadow-none after:text-#2D455B after:absolute after:-bottom-[9px] sm:after:left-[77%] after:left-[55%] after:-translate-x-1/2">00</span>    
                <span class="sm:w-[40px] w-[35px] sm:pl-2 pl-1.5 sm:text-[58px] text-[38px] mb-2 sm:ml-3 ml-0 inline-block text-slate-700 text-center relative">:</span>   
                <span id="sec" class="sm:w-[40px] w-[35px] sm:text-[58px] text-[38px] text-shadow inline-block text-center relative after:content-['SEC'] sm:after:text-[15px] after:text-[11px] after:text-shadow-none after:text-#2D455B after:absolute after:-bottom-[9px] sm:after:left-[77%] after:left-[55%] after:-translate-x-1/2">00</span>
            </div>
        </div>
    </div>
    
    
    
    <div class="todo-app overflow-y-hidden max-w-[700px] mx-auto sm:mt-[25px] mt-[35px] backdrop-blur-lg py-5 rounded-[20px] shadow-[0_0_100px_rgba(0,0,0,0.5)] border-3 border-white/18">
        <div class="mx-10 mb-9 flex items-center gap-3 justify-between">
            <div class="w-[300px] font-family">
                <span class="text-slate-300 text-[19px] text-bold">Task Management</span>
                <h1 class="text-center font-bold text-[50px] text-slate-600 leading-[58px] mb-5">Mo<em>men</em>tum</h1>
                <p class="text-slate-200 pl-3 font-Mono leading-[15px] text-[22px] font-bold">Date: Wed 4 Mart</p>
            </div>
            
            <div class="state-container w-[400px] mx-auto px-[15px] py-[15px] rounded-xl border-2 border-slate-500 shadow-[0_2px_5px_rgba(0,0,0,0.5)] flex items-center justify-between gap-[20px]">
                <div class="details w-full flex flex-col gap-3">
                    <h3 class="text-white text-bold text-[23px] font-family">You got this!</h3>
                    <div class="progressbar w-full h-[7px] bg-[#4a9bb8] rounded-[20px] relative">
                        <div class="progress w-[0%] h-full bg-slate-500 rounded-[20px] duration-400"></div>
                    </div>
                </div>
                <div class="state-number">
                    <p class="numbers w-[80px] h-[80px] flex items-center justify-center bg-slate-500 border-2 border-slate-600 font-bold rounded-[50%] text-slate-300 text-[22px]">0 / 0</p>
                </div>
            </div>
        </div>
        
        
        <form class="todo-form max-w-[600px] mx-auto flex items-center gap-2 justify-between">
            <input class="todo-input w-[90%] p-3 pl-3 bg-gray-200 font-family text-[22px] rounded-xl outline-none focus:shadow-md focus:shadow-cyan-600 duration-400 shadow-[0_3px_8px_rgba(0,0,0,0.5)]" type="text" name="inputValue" placeholder="Add new task..." required aria-label="add new task" autocomplete="off">
            <input class="todo-due w-[90%] text-[20px]  p-3 pl-3 bg-gray-200 font-family rounded-xl outline-none focus:shadow-md focus:shadow-cyan-600 duration-400 shadow-[0_3px_8px_rgba(0,0,0,0.5)]" type="datetime-local" name="inputValue" autocomplete="off">
            <button class="w-[130px] py-[8.5px] bg-[#12688D] rounded-xl shadow-[0_3px_8px_rgba(0,0,0,0.5)] duration-400 cursor-pointer" type="submit">
                <span class=" text-white">
                    <img class="mx-auto" src="./images/save-icon.svg" alt="save-icon" width="33" height="33">
                </span>
            </button>
        </form>
        
        <div class="max-w-[600px] mx-auto mt-5 flex items-center gap-6 justify-between font-family">
            <div onclick="handleAllListBox()" class="all-list w-[33%] p-1.5 rounded-xl text-center text-[18px] border-2 shadow-[0_1px_10px_rgba(0,0,0,0.5)] border-slate-400 bg-white cursor-pointer hover:scale-115 duration-400">All List: <span class="text-[26px] leading-[22px]">2</span></div>
            <div onclick="handleProgressListBox()"  class="progress-list w-[33%] p-1.5 rounded-xl text-center text-[18px] border-2 shadow-[0_1px_10px_rgba(0,0,0,0.5)] border-slate-400 bg-white cursor-pointer hover:scale-115 duration-400">On Progress: <span class="text-[26px] leading-[22px]"></span></div>
            <div onclick="handleDoneListBox()"  class="done-list w-[33%] p-1.5 rounded-xl text-center text-[18px] border-2 shadow-[0_1px_10px_rgba(0,0,0,0.5)] border-slate-400 bg-white cursor-pointer hover:scale-115 duration-400">Todo Done: <span class="text-[26px] leading-[22px]">2</span></div>
        </div>
        
        <ul class="todo-list max-h-[345px] overflow-y-auto max-w-[600px] mx-auto mt-5 py-3 rounded-xl backdrop-blur-lg space-y-3 "></ul>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
